name: Scrape Instagram Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC — scrape weekly

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: node scripts/scrape.js

      - name: Commit data.json back to repo
        run: |
          git config user.name "content-agent-bot"
          git config user.email "bot@content-agent"
          git add dashboard/data/data.json
          git diff --staged --quiet || git commit -m "chore: update scraped data [skip ci]"
          git push
