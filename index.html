<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Brain — Karen Lira</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #03030e;
      --surface: rgba(10,8,26,0.88);
      --surface2: rgba(18,14,42,0.80);
      --neon: #7c3aed;
      --neon2: #06b6d4;
      --text: #e2e8f0;
      --text-soft: #64748b;
      --border: rgba(124,58,237,0.20);
      --border2: rgba(255,255,255,0.07);
      --radius: 14px;
      --hh: 54px;
      --fh: 38px;
      --panel-w: 500px;
    }
    html, body { height:100%; overflow:hidden;
      background:var(--bg); color:var(--text);
      font-family:'Inter',sans-serif; font-size:14px; line-height:1.5; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(124,58,237,0.3); border-radius:4px; }

    /* ── HEADER ── */
    #header {
      position:fixed; inset:0 0 auto 0; height:var(--hh);
      background:rgba(3,3,14,0.94); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; z-index:300;
    }
    #header h1 { font-size:14px; font-weight:600; letter-spacing:.06em;
      text-transform:uppercase; color:var(--text-soft);
      display:flex; align-items:center; gap:10px; }
    #header h1 em { font-style:normal; color:var(--text); font-weight:700; }
    .hpulse { width:7px; height:7px; border-radius:50%;
      background:var(--neon); box-shadow:0 0 10px var(--neon), 0 0 24px rgba(124,58,237,.5);
      animation:hblink 2.4s ease-in-out infinite; }
    @keyframes hblink { 0%,100%{transform:scale(1)}50%{transform:scale(1.5)} }
    #clock { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-soft); }

    /* ── BRAIN CANVAS (full screen bg) ── */
    #brain-canvas {
      position:fixed; inset:var(--hh) 0 var(--fh) 0; z-index:1;
      display:block; width:100%; height:100%;
    }

    /* ── CONTENT PANEL (slides from right) ── */
    #content-panel {
      position:fixed; top:var(--hh); right:0; bottom:var(--fh);
      width:var(--panel-w);
      background:rgba(4,3,14,0.92);
      backdrop-filter:blur(28px) saturate(1.4);
      border-left:1px solid var(--border);
      box-shadow:-12px 0 60px rgba(0,0,0,0.7);
      z-index:100; overflow-y:auto; padding:24px;
      transform:translateX(100%);
      transition:transform 0.30s cubic-bezier(0.4,0,0.2,1);
    }
    #content-panel.open { transform:translateX(0); }

    .panel-back {
      display:flex; align-items:center; gap:8px;
      font-size:12px; color:var(--text-soft); cursor:pointer;
      margin-bottom:24px; width:fit-content;
      transition:color 0.15s;
    }
    .panel-back:hover { color:var(--neon); }
    .panel-back svg { width:14px; height:14px; }

    /* ── VIEWS ── */
    .view { display:none; } .view.active { display:block; }
    .view-title { display:flex; align-items:center; gap:10px;
      font-size:18px; font-weight:600; margin-bottom:22px; }

    /* ── DUMP ── */
    .dump-box { background:rgba(255,255,255,0.03);
      border:1px solid var(--border2); border-radius:var(--radius);
      padding:18px; margin-bottom:18px; }
    #braindump-text { width:100%; min-height:130px; max-height:260px;
      background:transparent; border:none; outline:none;
      color:var(--text); font-family:'Inter',sans-serif;
      font-size:14px; line-height:1.65; resize:vertical; }
    #braindump-text::placeholder { color:var(--text-soft); }
    .dump-actions { display:flex; gap:10px; margin-top:12px;
      padding-top:12px; border-top:1px solid var(--border2); }
    #dump-results { display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:11px; }

    /* ── BUTTONS ── */
    .btn { background:var(--neon); color:#fff; border:none;
      padding:8px 16px; border-radius:8px;
      font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
      cursor:pointer; transition:box-shadow .18s,filter .18s; }
    .btn:hover { box-shadow:0 0 20px rgba(124,58,237,.55); filter:brightness(1.1); }
    .btn-ghost { background:transparent; color:var(--text-soft);
      border:1px solid var(--border2); }
    .btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,.15);
      box-shadow:none; filter:none; }

    /* ── DUMP CARDS ── */
    .dump-card { background:rgba(255,255,255,0.03);
      border:1px solid var(--border2); border-radius:var(--radius);
      padding:12px 14px; transition:border-color .18s,transform .18s; }
    .dump-card:hover { transform:translateY(-2px);
      border-color:rgba(124,58,237,.35); }
    .dump-card-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .type-badge { font-family:'JetBrains Mono',monospace; font-size:10px;
      padding:2px 6px; border-radius:4px; background:rgba(255,255,255,.05);
      color:var(--text-soft); text-transform:uppercase; letter-spacing:.06em; }
    .dump-card-text { font-size:13px; line-height:1.55; color:var(--text); margin-bottom:10px; }
    .dump-card-actions { display:flex; gap:6px; justify-content:flex-end; }
    .card-btn { background:transparent; border:1px solid var(--border2);
      color:var(--text-soft); padding:3px 9px; border-radius:5px;
      font-family:'Inter',sans-serif; font-size:12px; cursor:pointer;
      transition:color .12s,border-color .12s; }
    .card-btn:hover { color:var(--text); border-color:rgba(255,255,255,.18); }
    .card-btn.arch:hover { color:#ef4444; border-color:rgba(239,68,68,.35); }
    .card-btn.promo:hover { color:var(--neon2); border-color:rgba(6,182,212,.35); }
    .area-trabalho{border-left:3px solid #7c3aed}
    .area-saude{border-left:3px solid #10b981}
    .area-relacionamentos{border-left:3px solid #f59e0b}
    .area-lazer{border-left:3px solid #ec4899}
    .area-academico{border-left:3px solid #06b6d4}
    .area-financeiro{border-left:3px solid #3b82f6}
    .area-geral{border-left:3px solid #475569}

    /* ── SECTION VIEWS ── */
    .quick-add-row { display:flex; gap:10px; margin-bottom:20px; }
    .text-input { flex:1; background:rgba(255,255,255,.03);
      border:1px solid var(--border2); border-radius:8px;
      padding:8px 12px; color:var(--text);
      font-family:'Inter',sans-serif; font-size:13px; outline:none;
      transition:border-color .18s,box-shadow .18s; }
    .text-input:focus { border-color:rgba(124,58,237,.5);
      box-shadow:0 0 0 3px rgba(124,58,237,.1); }
    .text-input::placeholder { color:var(--text-soft); }
    .columns { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .col-box { background:rgba(255,255,255,.02);
      border:1px solid var(--border2); border-radius:var(--radius);
      padding:14px; min-height:160px; }
    .col-header { display:flex; align-items:center;
      justify-content:space-between; margin-bottom:12px; }
    .col-title { font-family:'JetBrains Mono',monospace; font-size:10px;
      font-weight:500; text-transform:uppercase; letter-spacing:.09em; color:var(--text-soft); }
    .col-count { font-family:'JetBrains Mono',monospace; font-size:10px;
      background:rgba(255,255,255,.04); color:var(--text-soft);
      padding:2px 6px; border-radius:4px; }
    .col-items { display:flex; flex-direction:column; gap:8px; }
    .col-card { background:rgba(255,255,255,.03);
      border:1px solid var(--border2); border-radius:8px;
      padding:10px 11px; transition:border-color .15s,transform .15s; }
    .col-card:hover { border-color:rgba(124,58,237,.28); transform:translateY(-1px); }
    .col-card-text { font-size:12px; color:var(--text); line-height:1.5; }
    .col-card-btns { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
    .col-card-btn { background:transparent; border:1px solid var(--border2);
      color:var(--text-soft); padding:3px 7px; border-radius:4px;
      font-family:'Inter',sans-serif; font-size:11px; cursor:pointer;
      transition:color .12s,border-color .12s; }
    .col-card-btn:hover { color:var(--text); border-color:rgba(255,255,255,.18); }
    .col-card-btn.del:hover { color:#ef4444; border-color:rgba(239,68,68,.35); }
    .empty-state { color:var(--text-soft); font-size:12px;
      text-align:center; padding:16px 6px; line-height:1.7; }

    /* ── AGENDA ── */
    .week-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .day-card { background:rgba(255,255,255,.02);
      border:1px solid var(--border2); border-radius:var(--radius);
      padding:12px; min-height:110px; display:flex; flex-direction:column; }
    .day-card.today { border-color:rgba(124,58,237,.5);
      box-shadow:0 0 16px rgba(124,58,237,.10); }
    .day-name { font-family:'JetBrains Mono',monospace; font-size:10px;
      text-transform:uppercase; letter-spacing:.07em; color:var(--text-soft); margin-bottom:3px; }
    .day-num { font-size:20px; font-weight:700; margin-bottom:8px; line-height:1; }
    .day-card.today .day-num { color:var(--neon); }
    .day-events { display:flex; flex-direction:column; gap:4px; flex:1; }
    .day-event { display:flex; align-items:center; justify-content:space-between;
      gap:6px; background:rgba(255,255,255,.03);
      border-radius:4px; padding:4px 7px; font-size:11px; color:var(--text); }
    .day-event-rm { background:none; border:none; color:var(--text-soft);
      cursor:pointer; font-size:12px; line-height:1; padding:0; }
    .day-event-rm:hover { color:#ef4444; }
    .day-add { width:100%; background:transparent; border:none;
      border-top:1px solid var(--border2); color:var(--text);
      font-family:'Inter',sans-serif; font-size:11px;
      padding:6px 0 0; outline:none; margin-top:6px; }
    .day-add::placeholder { color:var(--text-soft); }

    /* ── SIDE NOTES PANEL ── */
    #notes-toggle { position:fixed; bottom:calc(var(--fh)+20px); right:8px;
      background:rgba(10,8,24,.9); backdrop-filter:blur(12px);
      border:1px solid var(--border); border-radius:8px;
      color:var(--text-soft); padding:8px 10px; cursor:pointer;
      font-size:11px; z-index:250; transition:color .12s,box-shadow .15s; }
    #notes-toggle:hover { color:var(--neon);
      box-shadow:0 0 16px rgba(124,58,237,.2); }
    #notes-panel {
      position:fixed; top:var(--hh); right:0; bottom:var(--fh);
      width:260px; background:rgba(5,3,16,.93);
      backdrop-filter:blur(24px); border-left:1px solid var(--border);
      padding:18px 14px; z-index:90; overflow-y:auto;
      transform:translateX(100%);
      transition:transform .22s cubic-bezier(.4,0,.2,1);
    }
    #notes-panel.open { transform:translateX(0); }
    .np-title { font-family:'JetBrains Mono',monospace; font-size:10px;
      text-transform:uppercase; letter-spacing:.09em;
      color:var(--text-soft); margin-bottom:8px; }
    .np-sec { margin-bottom:22px; }
    .np-textarea { width:100%; background:rgba(255,255,255,.04);
      border:1px solid var(--border2); border-radius:8px; padding:9px 11px;
      color:var(--text); font-family:'Inter',sans-serif; font-size:12px;
      line-height:1.55; resize:none; outline:none; min-height:60px;
      transition:border-color .18s; }
    .np-textarea:focus { border-color:rgba(124,58,237,.45); }
    .np-textarea::placeholder { color:var(--text-soft); }
    .np-list { list-style:none; display:flex; flex-direction:column; gap:6px; }
    .np-item { display:flex; align-items:flex-start; gap:7px;
      font-size:12px; color:var(--text); }
    .np-item input[type="checkbox"] { accent-color:var(--neon); margin-top:2px; flex-shrink:0; }
    .np-item-text { flex:1; word-break:break-word; }
    .np-item-text.done { text-decoration:line-through; color:var(--text-soft); }
    .np-rm { background:none; border:none; color:var(--text-soft);
      cursor:pointer; font-size:12px; padding:0; flex-shrink:0; line-height:1; }
    .np-rm:hover { color:#ef4444; }
    .np-add { width:100%; background:transparent; border:1px solid var(--border2);
      border-radius:6px; padding:6px 9px; color:var(--text);
      font-family:'Inter',sans-serif; font-size:11px; outline:none; margin-top:8px;
      transition:border-color .18s; }
    .np-add:focus { border-color:rgba(124,58,237,.45); }
    .np-add::placeholder { color:var(--text-soft); }

    /* ── FOOTER ── */
    #footer { position:fixed; inset:auto 0 0 0; height:var(--fh);
      background:rgba(3,3,14,.94); backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; z-index:300; }
    #last-updated { font-family:'JetBrains Mono',monospace;
      font-size:11px; color:var(--text-soft); }
    .status-ind { display:flex; align-items:center; gap:6px;
      font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-soft); }
    .sdot { width:6px; height:6px; border-radius:50%; background:#10b981;
      box-shadow:0 0 8px rgba(16,185,129,.7);
      animation:sblink 3s ease-in-out infinite; }
    @keyframes sblink { 0%,100%{opacity:1}50%{opacity:.4} }

    /* ── HINT (brain click instruction) ── */
    #hint {
      position:fixed; bottom:calc(var(--fh)+16px); left:50%;
      transform:translateX(-50%);
      font-family:'JetBrains Mono',monospace; font-size:11px;
      color:rgba(100,116,139,0.7); letter-spacing:.05em;
      pointer-events:none; z-index:5;
      animation:hintFade 6s ease-in-out forwards;
    }
    @keyframes hintFade { 0%{opacity:0}10%{opacity:1}70%{opacity:1}100%{opacity:0} }

    @media(max-width:800px){
      :root{ --panel-w:100vw }
      .columns{grid-template-columns:1fr}
      .week-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>

<header id="header">
  <h1><span class="hpulse"></span>Second <em>Brain</em></h1>
  <div id="clock"></div>
</header>

<!-- Full-screen brain canvas -->
<canvas id="brain-canvas"></canvas>

<!-- Content panel (slides from right) -->
<div id="content-panel">
  <div class="panel-back" onclick="App.closePanel()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    Voltar ao cérebro
  </div>

  <div class="view active" id="view-braindump">
    <div class="view-title"><span>🧠</span> Braindump</div>
    <div class="dump-box">
      <textarea id="braindump-text" placeholder="Despeje tudo aqui..."></textarea>
      <div class="dump-actions">
        <button class="btn" onclick="App.organizeDump()">Organizar</button>
        <button class="btn btn-ghost" onclick="App.clearDump()">Limpar</button>
      </div>
    </div>
    <div id="dump-results"></div>
  </div>

  <div class="view" id="view-trabalho">
    <div class="view-title"><span>💼</span> Trabalho</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-trabalho" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('trabalho')">Adicionar</button>
    </div>
    <div class="columns" id="cols-trabalho"></div>
  </div>

  <div class="view" id="view-saude">
    <div class="view-title"><span>🩺</span> Saúde</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-saude" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('saude')">Adicionar</button>
    </div>
    <div class="columns" id="cols-saude"></div>
  </div>

  <div class="view" id="view-relacionamentos">
    <div class="view-title"><span>🤝</span> Relacionamentos</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-relacionamentos" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('relacionamentos')">Adicionar</button>
    </div>
    <div class="columns" id="cols-relacionamentos"></div>
  </div>

  <div class="view" id="view-lazer">
    <div class="view-title"><span>🎯</span> Lazer</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-lazer" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('lazer')">Adicionar</button>
    </div>
    <div class="columns" id="cols-lazer"></div>
  </div>

  <div class="view" id="view-academico">
    <div class="view-title"><span>📚</span> Acadêmico</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-academico" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('academico')">Adicionar</button>
    </div>
    <div class="columns" id="cols-academico"></div>
  </div>

  <div class="view" id="view-financeiro">
    <div class="view-title"><span>💰</span> Financeiro</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-financeiro" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('financeiro')">Adicionar</button>
    </div>
    <div class="columns" id="cols-financeiro"></div>
  </div>

  <div class="view" id="view-agenda">
    <div class="view-title"><span>📅</span> Agenda</div>
    <div class="week-grid" id="week-grid"></div>
  </div>
</div>

<!-- Notes toggle & panel -->
<button id="notes-toggle" onclick="App.toggleNotes()" title="Anotações">📋</button>
<aside id="notes-panel">
  <div class="np-sec">
    <div class="np-title">Foco desta semana</div>
    <textarea class="np-textarea" id="p-focus" placeholder="Defina seu foco..."></textarea>
  </div>
  <div class="np-sec">
    <div class="np-title">Pendências críticas</div>
    <ul class="np-list" id="p-pending-list"></ul>
    <input class="np-add" id="p-pending-input" placeholder="+ Adicionar pendência" />
  </div>
  <div class="np-sec">
    <div class="np-title">Ideias para não perder</div>
    <ul class="np-list" id="p-ideas-list"></ul>
    <input class="np-add" id="p-ideas-input" placeholder="+ Adicionar ideia" />
  </div>
</aside>

<div id="hint">Clique nos nós do cérebro para navegar</div>

<footer id="footer">
  <span id="last-updated">—</span>
  <div class="status-ind"><div class="sdot"></div>Ativo</div>
</footer>

<script>
'use strict';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BRAIN SHAPE (profile, facing left, normalized offsets from center)
// dx: negative = frontal/left, positive = occipital/right
// dy: negative = up (crown), positive = down (brainstem)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const BRAIN_SHAPE = [
  // Clockwise from crown
  [ 0.00,-1.00], // vertex/crown
  [ 0.14,-0.97], // crown right
  [ 0.32,-0.90], // parietal upper
  [ 0.52,-0.76], // occipital superior
  [ 0.68,-0.55], // occipital
  [ 0.76,-0.28], // occipital inferior
  [ 0.76, 0.00], // parietooccipital junction
  [ 0.70, 0.26], // right temporal-occipital
  [ 0.58, 0.48], // right cerebellar
  [ 0.38, 0.64], // cerebellum right
  [ 0.16, 0.74], // cerebellum lower-right
  [ 0.02, 0.82], // brainstem right
  [ 0.00, 0.94], // brainstem tip
  [-0.04, 0.82], // brainstem left
  [-0.18, 0.72], // cerebellum lower-left
  [-0.36, 0.62], // cerebellum left
  [-0.52, 0.50], // temporal inferior
  [-0.66, 0.34], // temporal pole lower
  [-0.76, 0.12], // temporal pole (protrudes)
  [-0.74,-0.12], // just above temporal (slight concavity — Sylvian)
  [-0.68,-0.30], // frontal inferior
  [-0.60,-0.50], // frontal middle
  [-0.46,-0.70], // frontal superior
  [-0.26,-0.88], // prefrontal/top
  [-0.10,-0.98], // near crown left
  [ 0.00,-1.00], // back to crown
];

// Menu nodes: anatomical positions on the brain
const BRAIN_NODES = [
  {id:'braindump',      icon:'🧠', label:'Braindump',       dx: 0.10, dy:-0.62, rgb:[124, 58,237]},
  {id:'trabalho',       icon:'💼', label:'Trabalho',        dx:-0.50, dy:-0.42, rgb:[124, 58,237]},
  {id:'saude',          icon:'🩺', label:'Saúde',           dx:-0.60, dy: 0.08, rgb:[ 16,185,129]},
  {id:'relacionamentos',icon:'🤝', label:'Relacionamentos',  dx:-0.44, dy: 0.52, rgb:[245,158, 11]},
  {id:'lazer',          icon:'🎯', label:'Lazer',           dx: 0.54, dy: 0.40, rgb:[236, 72,153]},
  {id:'academico',      icon:'📚', label:'Acadêmico',       dx: 0.60, dy:-0.36, rgb:[  6,182,212]},
  {id:'financeiro',     icon:'💰', label:'Financeiro',      dx: 0.12, dy: 0.70, rgb:[ 59,130,246]},
  {id:'agenda',         icon:'📅', label:'Agenda',          dx: 0.02, dy: 0.87, rgb:[124, 58,237]},
];

// Circuit board decorations (from brain edge outward)
const CIRCUITS = [
  {ox:.74,oy:-.25, segs:[{dx:.06,dy:0},{dx:0,dy:-.08},{dx:.05,dy:0}]},
  {ox:.74,oy: .12, segs:[{dx:.08,dy:0},{dx:0,dy: .10},{dx:.05,dy:0}]},
  {ox:.62,oy:-.52, segs:[{dx:.05,dy:0},{dx:0,dy:-.08},{dx:.06,dy:0},{dx:0,dy:-.05}]},
  {ox:-.72,oy:-.24,segs:[{dx:-.06,dy:0},{dx:0,dy:-.08},{dx:-.05,dy:0}]},
  {ox:-.72,oy: .08,segs:[{dx:-.08,dy:0},{dx:0,dy: .10},{dx:-.05,dy:0}]},
  {ox:-.42,oy:-.68,segs:[{dx:-.06,dy:0},{dx:0,dy:-.08},{dx:-.06,dy:0},{dx:0,dy:-.04}]},
  {ox:-.30,oy: .64,segs:[{dx:-.06,dy:0},{dx:0,dy: .07},{dx:-.04,dy:0}]},
  {ox: .30,oy: .66,segs:[{dx: .06,dy:0},{dx:0,dy: .07},{dx: .04,dy:0}]},
];

function initBrain() {
  const canvas = document.getElementById('brain-canvas');
  const ctx    = canvas.getContext('2d');

  let W, H, Cx, Cy, Rx, Ry;
  let outline = [], nodes = [], triangles = [], particles = [];
  let hoverNode = null, activeNode = 'braindump', brainTime = 0;
  // Smooth pan when panel opens
  let targetCxFraction = 0.50, currentCxFraction = 0.50;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = canvas.parentElement ? window.innerWidth : canvas.offsetWidth;
    H = window.innerHeight - parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hh')) * 1
                           - parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fh')) * 1;
    const parent = canvas.parentElement || document.body;
    canvas.width  = window.innerWidth * dpr;
    canvas.height = (window.innerHeight - 54 - 38) * dpr;
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = (window.innerHeight - 54 - 38) + 'px';
    ctx.scale(dpr, dpr);
    W = window.innerWidth;
    H = window.innerHeight - 54 - 38;
    computeGeometry();
    buildMesh();
  }

  function computeGeometry() {
    Cx = W * currentCxFraction;
    Cy = H * 0.48;
    // Scale to fill nicely — brain shape spans ~1.56 in x and ~1.94 in y
    const maxRx = W * 0.36;
    const maxRy = H * 0.46;
    // Choose R so brain fits; use separate x/y scaling
    Rx = maxRx;
    Ry = maxRy;
    outline = BRAIN_SHAPE.map(([dx,dy]) => ({x: Cx + dx*Rx, y: Cy + dy*Ry}));
    nodes   = BRAIN_NODES.map(n => ({...n, px: Cx + n.dx*Rx, py: Cy + n.dy*Ry}));
  }

  function pointInBrain(px, py) {
    let inside = false;
    const n = outline.length;
    for (let i=0, j=n-1; i<n; j=i++) {
      const {x:xi,y:yi}=outline[i], {x:xj,y:yj}=outline[j];
      if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  function buildMesh() {
    const COLS=16, ROWS=24;
    // Brain bounding box
    const minX=Math.min(...outline.map(p=>p.x));
    const maxX=Math.max(...outline.map(p=>p.x));
    const minY=Math.min(...outline.map(p=>p.y));
    const maxY=Math.max(...outline.map(p=>p.y));
    const bw=maxX-minX, bh=maxY-minY;

    const grid=[];
    for (let r=0;r<=ROWS;r++) {
      const row=[];
      for (let c=0;c<=COLS;c++) {
        const jx=(Math.random()-.5)*bw*.03;
        const jy=(Math.random()-.5)*bh*.03;
        row.push({
          x: minX + (c/COLS)*bw + jx,
          y: minY + (r/ROWS)*bh + jy,
        });
      }
      grid.push(row);
    }

    triangles=[];
    for (let r=0;r<ROWS;r++) {
      for (let c=0;c<COLS;c++) {
        const a=grid[r][c], b=grid[r][c+1];
        const d=grid[r+1][c], e=grid[r+1][c+1];
        const cx1=(a.x+b.x+d.x)/3, cy1=(a.y+b.y+d.y)/3;
        if (pointInBrain(cx1,cy1)) triangles.push({v:[a,b,d],cx:cx1,cy:cy1,phase:Math.random()*Math.PI*2});
        const cx2=(b.x+e.x+d.x)/3, cy2=(b.y+e.y+d.y)/3;
        if (pointInBrain(cx2,cy2)) triangles.push({v:[b,e,d],cx:cx2,cy:cy2,phase:Math.random()*Math.PI*2});
      }
    }
  }

  function setBrainClip() {
    ctx.beginPath();
    ctx.moveTo(outline[0].x, outline[0].y);
    for (let i=1;i<outline.length;i++) ctx.lineTo(outline[i].x, outline[i].y);
    ctx.closePath();
    ctx.clip();
  }

  function triColor(cx, cy, t) {
    const ndx=(cx-Cx)/Rx, ndy=(cy-Cy)/Ry;
    const d=Math.sqrt(ndx*ndx+ndy*ndy);
    const tVal=Math.max(0,1-d/1.05);
    const pulse=Math.sin(t*0.4)*0.5+0.5;
    const r=Math.round(8  + tVal*25 + pulse*4);
    const g=Math.round(5  + tVal*12 + pulse*2);
    const b=Math.round(30 + tVal*65 + pulse*8);
    const a=0.50+tVal*0.35+pulse*0.05;
    return {
      fill:`rgba(${r},${g},${b},${a})`,
      edge:`rgba(${Math.round(45+tVal*85)},${Math.round(25+tVal*55)},${Math.round(150+tVal*105)},${.18+tVal*.32})`,
    };
  }

  function drawCircuits() {
    CIRCUITS.forEach(c => {
      const sx=Cx+c.ox*Rx, sy=Cy+c.oy*Ry;
      let cx2=sx, cy2=sy;
      ctx.beginPath(); ctx.moveTo(cx2,cy2);
      c.segs.forEach(s => {
        cx2+=s.dx*Rx*0.55; cy2+=s.dy*Ry*0.55;
        ctx.lineTo(cx2,cy2);
      });
      ctx.strokeStyle='rgba(6,182,212,0.22)';
      ctx.lineWidth=1; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx2,cy2,3,0,Math.PI*2);
      ctx.fillStyle='rgba(6,182,212,0.35)'; ctx.fill();
      // node at start
      ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2);
      ctx.fillStyle='rgba(6,182,212,0.3)'; ctx.fill();
    });
  }

  function drawBrain() {
    ctx.save();
    setBrainClip();

    // Ambient inside glow
    const agl = ctx.createRadialGradient(Cx,Cy,0, Cx,Cy,Ry*1.1);
    agl.addColorStop(0,'rgba(40,15,100,0.6)');
    agl.addColorStop(0.6,'rgba(15,8,50,0.8)');
    agl.addColorStop(1,'rgba(5,3,20,0.95)');
    ctx.fillStyle=agl;
    ctx.fillRect(Cx-Rx*1.2, Cy-Ry*1.2, Rx*2.4, Ry*2.4);

    // Triangles
    triangles.forEach(tri => {
      const [a,b,c2]=tri.v;
      const style=triColor(tri.cx,tri.cy,brainTime+tri.phase);
      ctx.beginPath();
      ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c2.x,c2.y);
      ctx.closePath();
      ctx.fillStyle=style.fill; ctx.fill();
      ctx.strokeStyle=style.edge; ctx.lineWidth=0.6; ctx.stroke();
    });

    // Bottom brainstem glow
    const bg=ctx.createRadialGradient(Cx,Cy+Ry*.84,0, Cx,Cy+Ry*.84, Rx*.50);
    bg.addColorStop(0,'rgba(100,40,220,0.40)');
    bg.addColorStop(1,'rgba(100,40,220,0)');
    ctx.fillStyle=bg; ctx.fillRect(Cx-Rx,Cy,Rx*2,Ry*1.1);

    // Crown glow
    const tg=ctx.createRadialGradient(Cx,Cy-Ry*.85,0, Cx,Cy-Ry*.85, Rx*.45);
    tg.addColorStop(0,'rgba(6,182,212,0.18)');
    tg.addColorStop(1,'rgba(6,182,212,0)');
    ctx.fillStyle=tg; ctx.fillRect(Cx-Rx,Cy-Ry*1.1,Rx*2,Ry*.8);

    ctx.restore();

    // Brain outline glow (outside clip)
    ctx.beginPath();
    ctx.moveTo(outline[0].x, outline[0].y);
    for (let i=1;i<outline.length;i++) ctx.lineTo(outline[i].x,outline[i].y);
    ctx.closePath();
    ctx.strokeStyle='rgba(100,50,230,0.55)';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }

  function drawConnections() {
    const an=nodes.find(n=>n.id===activeNode);
    if (!an) return;
    nodes.forEach(n => {
      if (n.id===activeNode) return;
      ctx.beginPath();
      ctx.setLineDash([3,7]);
      ctx.strokeStyle='rgba(124,58,237,0.15)';
      ctx.lineWidth=0.8;
      ctx.moveTo(an.px,an.py); ctx.lineTo(n.px,n.py);
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  function spawnParticle() {
    const i=Math.floor(Math.random()*nodes.length);
    const j=(i+1+Math.floor(Math.random()*(nodes.length-1)))%nodes.length;
    particles.push({
      ax:nodes[i].px,ay:nodes[i].py,
      bx:nodes[j].px,by:nodes[j].py,
      t:0,speed:0.005+Math.random()*.008,
      rgb:nodes[i].rgb,
    });
  }

  function drawParticles() {
    particles=particles.filter(p => {
      p.t+=p.speed; if(p.t>=1) return false;
      const x=p.ax+(p.bx-p.ax)*p.t, y=p.ay+(p.by-p.ay)*p.t;
      const fade=1-Math.abs(p.t-.5)*2;
      ctx.beginPath(); ctx.arc(x,y,1.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]},${.85*fade})`;
      ctx.fill(); return true;
    });
    if(Math.random()<.05) spawnParticle();
  }

  function drawNodes() {
    nodes.forEach(n => {
      const isActive=n.id===activeNode, isHover=n.id===hoverNode;
      const [r,g,b]=n.rgb;

      // Halo glow
      const hr=isActive?50:isHover?38:24;
      const ha=isActive?.38:isHover?.26:.12;
      const hg=ctx.createRadialGradient(n.px,n.py,0,n.px,n.py,hr);
      hg.addColorStop(0,`rgba(${r},${g},${b},${ha})`);
      hg.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.fillStyle=hg;
      ctx.beginPath(); ctx.arc(n.px,n.py,hr,0,Math.PI*2); ctx.fill();

      // Pulsing rings for active
      if(isActive) {
        [14,22,32].forEach((base,i) => {
          const rr=base+Math.sin(brainTime*1.6+i*1.4)*4;
          const ra=(.40-.12*i)*(1+Math.sin(brainTime*1.6+i*1.4)*.15);
          ctx.beginPath(); ctx.arc(n.px,n.py,rr,0,Math.PI*2);
          ctx.strokeStyle=`rgba(${r},${g},${b},${ra})`;
          ctx.lineWidth=1.5; ctx.stroke();
        });
      } else if(isHover) {
        const rr=16+Math.sin(brainTime*2)*2;
        ctx.beginPath(); ctx.arc(n.px,n.py,rr,0,Math.PI*2);
        ctx.strokeStyle=`rgba(${r},${g},${b},0.5)`;
        ctx.lineWidth=1; ctx.stroke();
      }

      // Core dot
      const cr=isActive?10:isHover?9:7;
      ctx.beginPath(); ctx.arc(n.px,n.py,cr,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},${isActive?.96:.72})`;
      ctx.fill();

      // White specular
      ctx.beginPath();
      ctx.arc(n.px-cr*.28,n.py-cr*.28,cr*.36,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${isActive?.85:.55})`; ctx.fill();

      // Icon
      const iconSz=isActive?18:isHover?16:13;
      ctx.font=`${iconSz}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.icon, n.px, n.py-(cr+iconSz*.6));

      // Label
      if(isActive||isHover) {
        const fs=isActive?12:11;
        ctx.save();
        ctx.font=`${isActive?'600 ':''}${fs}px Inter,sans-serif`;
        ctx.shadowColor=`rgba(${r},${g},${b},0.9)`;
        ctx.shadowBlur=10;
        ctx.fillStyle=`rgba(${r},${g},${b},1)`;
        ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillText(n.label, n.px, n.py+cr+6);
        ctx.restore();
      }
    });
  }

  function frame() {
    brainTime+=0.016;

    // Smooth pan
    currentCxFraction+=(targetCxFraction-currentCxFraction)*0.07;
    if(Math.abs(currentCxFraction-targetCxFraction)>0.001) computeGeometry();

    ctx.clearRect(0,0,W,H);

    // Dark background
    ctx.fillStyle='rgba(3,3,14,1)';
    ctx.fillRect(0,0,W,H);

    drawCircuits();
    drawBrain();
    drawConnections();
    drawParticles();
    drawNodes();

    requestAnimationFrame(frame);
  }

  // Mouse events
  canvas.addEventListener('mousemove', e => {
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    let found=null;
    for(const n of nodes) { if(Math.hypot(mx-n.px,my-n.py)<28){found=n.id;break;} }
    hoverNode=found;
    canvas.style.cursor=found?'pointer':'default';
  });

  canvas.addEventListener('click', e => {
    if(hoverNode) { activeNode=hoverNode; navigateTo(hoverNode); }
  });

  // API for external sync
  window.setBrainNode = id => { activeNode=id; };
  window.setBrainPan  = open => { targetCxFraction = open ? 0.28 : 0.50; };

  resize();
  window.addEventListener('resize', () => { ctx.resetTransform(); resize(); });
  frame();
}

const COL_LABELS={andamento:'Em andamento',pendente:'Pendente',concluido:'Concluído'};

function renderSection(area){
  const data=S.sections[area];
  document.getElementById('cols-'+area).innerHTML=COLS.map(col=>{
    const items=data[col]||[];
    const others=COLS.filter(c=>c!==col);
    const cards=items.length
      ?items.map(it=>`<div class="col-card"><div class="col-card-text">${esc(it.text)}</div><div class="col-card-btns">${others.map(o=>`<button class="col-card-btn" onclick="App.moveCard('${area}','${it.id}','${col}','${o}')">→ ${esc(COL_LABELS[o])}</button>`).join('')}<button class="col-card-btn del" onclick="App.deleteCard('${area}','${it.id}','${col}')">× Remover</button></div></div>`).join('')
      :`<div class="empty-state">Nenhuma pendência registrada.<br>Use o Braindump para capturar.</div>`;
    return`<div class="col-box"><div class="col-header"><span class="col-title">${COL_LABELS[col]}</span><span class="col-count">${items.length}</span></div><div class="col-items">${cards}</div></div>`;
  }).join('');
  const inp=document.getElementById('qi-'+area);
  if(inp) inp.onkeydown=e=>{if(e.key==='Enter')App.quickAdd(area);};
}

function renderAgenda(){
  const today=new Date(); today.setHours(0,0,0,0);
  document.getElementById('week-grid').innerHTML=Array.from({length:7},(_,i)=>{
    const d=new Date(today); d.setDate(today.getDate()+i);
    const key=d.toISOString().slice(0,10);
    const evs=S.agenda[key]||[];
    return`<div class="day-card${i===0?' today':''}">
      <div class="day-name">${DAYS[d.getDay()]}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-events">${evs.map((ev,idx)=>`<div class="day-event"><span>${esc(ev)}</span><button class="day-event-rm" onclick="App.removeEvent('${key}',${idx})">×</button></div>`).join('')}</div>
      <input class="day-add" placeholder="+ Compromisso" onkeydown="if(event.key==='Enter'&&this.value.trim()){App.addEvent('${key}',this)}" /></div>`;
  }).join('');
}

function renderNotesList(type){
  const items=S.panel[type]||[];
  document.getElementById('p-'+type+'-list').innerHTML=items.map((it,i)=>`
    <li class="np-item">
      <input type="checkbox" ${it.done?'checked':''} onchange="App.toggleNote('${type}',${i})">
      <span class="np-item-text${it.done?' done':''}">${esc(it.text)}</span>
      <button class="np-rm" onclick="App.removeNote('${type}',${i})">×</button>
    </li>`).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// APP API
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const App={
  organizeDump(){
    const ta=document.getElementById('braindump-text');
    const raw=ta.value.trim(); if(!raw) return;
    const cards=raw.split(/\n+/).map(l=>l.trim()).filter(Boolean).map(text=>({
      id:uid(),text,
      area:classify(text,AREA_KW,'geral'),
      type:classify(text,TYPE_KW,'item'),
    }));
    S.dumpCards=[...S.dumpCards,...cards]; S.dumpText=ta.value;
    save(); renderDumpCards();
  },
  clearDump(){document.getElementById('braindump-text').value='';S.dumpText='';save();},
  archiveDump(id){S.dumpCards=S.dumpCards.filter(c=>c.id!==id);save();renderDumpCards();},
  promoteDump(id){
    const c=S.dumpCards.find(c=>c.id===id); if(!c||c.area==='geral') return;
    S.sections[c.area].pendente.push({id:uid(),text:c.text});
    S.dumpCards=S.dumpCards.filter(x=>x.id!==id); save(); renderDumpCards();
  },
  quickAdd(area){
    const inp=document.getElementById('qi-'+area);
    const text=inp.value.trim(); if(!text) return;
    S.sections[area].pendente.push({id:uid(),text});
    inp.value=''; save(); renderSection(area);
  },
  moveCard(area,id,from,to){
    const idx=S.sections[area][from].findIndex(i=>i.id===id); if(idx===-1) return;
    const[item]=S.sections[area][from].splice(idx,1);
    S.sections[area][to].push(item); save(); renderSection(area);
  },
  deleteCard(area,id,col){
    S.sections[area][col]=S.sections[area][col].filter(i=>i.id!==id);
    save(); renderSection(area);
  },
  addEvent(key,input){
    if(!S.agenda[key])S.agenda[key]=[];
    S.agenda[key].push(input.value.trim()); input.value=''; save(); renderAgenda();
  },
  removeEvent(key,idx){S.agenda[key]?.splice(idx,1);save();renderAgenda();},
  closePanel(){
    document.getElementById('content-panel').classList.remove('open');
    panelOpen=false;
    if(window.setBrainPan) window.setBrainPan(false);
  },
  toggleNotes(){
    S.notesOpen=!S.notesOpen;
    document.getElementById('notes-panel').classList.toggle('open',S.notesOpen);
    save();
  },
  toggleNote(type,idx){S.panel[type][idx].done=!S.panel[type][idx].done;save();renderNotesList(type);},
  removeNote(type,idx){S.panel[type].splice(idx,1);save();renderNotesList(type);},
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function init(){
  renderClock(); setInterval(renderClock,1000);
  document.getElementById('braindump-text').value=S.dumpText||'';
  renderDumpCards();

  if(S.notesOpen) document.getElementById('notes-panel').classList.add('open');

  const fe=document.getElementById('p-focus');
  fe.value=S.panel.focus||'';
  fe.addEventListener('input',()=>{S.panel.focus=fe.value;save();});

  ['pending','ideas'].forEach(type=>{
    renderNotesList(type);
    document.getElementById('p-'+type+'-input').addEventListener('keydown',e=>{
      if(e.key!=='Enter') return;
      const text=e.target.value.trim(); if(!text) return;
      S.panel[type].push({text,done:false}); e.target.value='';
      save(); renderNotesList(type);
    });
  });

  renderFooter();
  initBrain();
})();
</script>
