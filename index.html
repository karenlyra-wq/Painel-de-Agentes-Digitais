<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Brain — Karen Lira</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a28;
      --neon: #7c3aed;
      --neon2: #06b6d4;
      --text: #e2e8f0;
      --text-soft: #64748b;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
      --sidebar-w: 60px;
      --sidebar-expanded: 200px;
      --panel-w: 280px;
      --header-h: 56px;
      --footer-h: 40px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── HEADER ── */
    #header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--header-h);
      background: rgba(18,18,26,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 calc(var(--sidebar-w) + 16px);
      z-index: 200;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    #header h1 em {
      font-style: normal;
      color: var(--neon);
    }

    #clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-soft);
    }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: var(--footer-h);
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 10px 0;
      z-index: 150;
      overflow: hidden;
      transition: width 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    #sidebar:hover { width: var(--sidebar-expanded); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      cursor: pointer;
      color: var(--text-soft);
      white-space: nowrap;
      border-left: 2px solid transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      user-select: none;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }

    .nav-item.active {
      color: var(--neon);
      border-left-color: var(--neon);
      background: rgba(124,58,237,0.07);
    }

    .nav-icon { font-size: 17px; min-width: 22px; text-align: center; }

    .nav-label {
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    #sidebar:hover .nav-label { opacity: 1; }

    /* ── MAIN ── */
    #main {
      position: fixed;
      top: var(--header-h);
      left: var(--sidebar-w);
      right: 0;
      bottom: var(--footer-h);
      overflow-y: auto;
      padding: 24px;
      transition: right 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    #main.panel-open { right: var(--panel-w); }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    .view-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 22px;
    }

    /* ── BRAINDUMP ── */
    .dump-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    #braindump-text {
      width: 100%;
      min-height: 150px;
      max-height: 320px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.65;
      resize: vertical;
    }

    #braindump-text::placeholder { color: var(--text-soft); }

    .dump-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    #dump-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }

    /* ── BUTTONS ── */
    .btn {
      background: var(--neon);
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow 0.15s, filter 0.15s;
    }

    .btn:hover {
      box-shadow: 0 0 18px rgba(124,58,237,0.45);
      filter: brightness(1.08);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
      box-shadow: none;
      filter: none;
    }

    /* ── DUMP CARDS ── */
    .dump-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .dump-card:hover {
      border-color: rgba(124,58,237,0.3);
      box-shadow: 0 0 14px rgba(124,58,237,0.07);
    }

    .dump-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
    }

    .area-icon { font-size: 15px; }

    .type-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .dump-card-text {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 11px;
    }

    .dump-card-actions {
      display: flex;
      gap: 7px;
      justify-content: flex-end;
    }

    .card-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      padding: 4px 10px;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }

    .card-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .card-btn.arch:hover { color: #ef4444; border-color: rgba(239,68,68,0.35); }
    .card-btn.promo:hover { color: var(--neon2); border-color: rgba(6,182,212,0.35); }

    /* area left-border colors */
    .area-trabalho       { border-left: 3px solid #7c3aed; }
    .area-saude          { border-left: 3px solid #10b981; }
    .area-relacionamentos{ border-left: 3px solid #f59e0b; }
    .area-lazer          { border-left: 3px solid #ec4899; }
    .area-academico      { border-left: 3px solid #06b6d4; }
    .area-financeiro     { border-left: 3px solid #3b82f6; }
    .area-geral          { border-left: 3px solid #64748b; }

    /* ── SECTION VIEW ── */
    .quick-add-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .text-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .text-input:focus {
      border-color: rgba(124,58,237,0.5);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }

    .text-input::placeholder { color: var(--text-soft); }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .col-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 180px;
    }

    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .col-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-soft);
    }

    .col-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      background: var(--surface2);
      color: var(--text-soft);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .col-items { display: flex; flex-direction: column; gap: 9px; }

    .col-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 12px;
      transition: border-color 0.12s;
    }

    .col-card:hover { border-color: rgba(124,58,237,0.28); }

    .col-card-text { font-size: 13px; color: var(--text); line-height: 1.5; }

    .col-card-btns {
      display: flex;
      gap: 5px;
      margin-top: 9px;
      flex-wrap: wrap;
    }

    .col-card-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      padding: 3px 8px;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }

    .col-card-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .col-card-btn.del:hover { color: #ef4444; border-color: rgba(239,68,68,0.35); }

    .empty-state {
      color: var(--text-soft);
      font-size: 12px;
      text-align: center;
      padding: 18px 8px;
      line-height: 1.6;
    }

    /* ── AGENDA ── */
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
    }

    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
    }

    .day-card.today {
      border-color: rgba(124,58,237,0.45);
      box-shadow: 0 0 18px rgba(124,58,237,0.09);
    }

    .day-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-soft);
      margin-bottom: 3px;
    }

    .day-num {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1;
    }

    .day-card.today .day-num { color: var(--neon); }

    .day-events { display: flex; flex-direction: column; gap: 5px; flex: 1; }

    .day-event {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      background: var(--surface2);
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      color: var(--text);
    }

    .day-event-rm {
      background: none;
      border: none;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }

    .day-event-rm:hover { color: #ef4444; }

    .day-add {
      width: 100%;
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 7px 0 0;
      outline: none;
      margin-top: 8px;
    }

    .day-add::placeholder { color: var(--text-soft); }

    /* ── RIGHT PANEL ── */
    #panel-toggle {
      position: fixed;
      top: calc(50% - 20px);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: var(--text-soft);
      padding: 10px 7px;
      cursor: pointer;
      font-size: 11px;
      z-index: 160;
      transition: right 0.2s cubic-bezier(0.4,0,0.2,1), color 0.12s;
      line-height: 1;
    }

    #panel-toggle:hover { color: var(--neon); }

    #right-panel {
      position: fixed;
      top: var(--header-h);
      right: 0;
      bottom: var(--footer-h);
      width: var(--panel-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      z-index: 140;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    #right-panel.open { transform: translateX(0); }

    .panel-sec { margin-bottom: 26px; }

    .panel-sec-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    .panel-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      resize: none;
      outline: none;
      min-height: 70px;
      transition: border-color 0.15s;
    }

    .panel-textarea:focus { border-color: rgba(124,58,237,0.45); }
    .panel-textarea::placeholder { color: var(--text-soft); }

    .panel-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }

    .panel-list-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }

    .panel-list-item input[type="checkbox"] {
      accent-color: var(--neon);
      margin-top: 2px;
      flex-shrink: 0;
    }

    .panel-item-text { flex: 1; word-break: break-word; }
    .panel-item-text.done { text-decoration: line-through; color: var(--text-soft); }

    .panel-rm {
      background: none;
      border: none;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }

    .panel-rm:hover { color: #ef4444; }

    .panel-add {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      outline: none;
      margin-top: 9px;
      transition: border-color 0.15s;
    }

    .panel-add:focus { border-color: rgba(124,58,237,0.45); }
    .panel-add::placeholder { color: var(--text-soft); }

    /* ── FOOTER ── */
    #footer {
      position: fixed;
      inset: auto 0 0 0;
      height: var(--footer-h);
      background: rgba(18,18,26,0.96);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 calc(var(--sidebar-w) + 16px);
      z-index: 200;
    }

    #last-updated {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-soft);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-soft);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 7px rgba(16,185,129,0.65);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .columns { grid-template-columns: 1fr 1fr; }
      .week-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 640px) {
      :root { --panel-w: 100vw; }
      .columns { grid-template-columns: 1fr; }
      .week-grid { grid-template-columns: repeat(2, 1fr); }
      #main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <h1>Second <em>Brain</em></h1>
  <div id="clock"></div>
</header>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="nav-item active" data-view="braindump">
    <span class="nav-icon">🧠</span><span class="nav-label">Braindump</span>
  </div>
  <div class="nav-item" data-view="trabalho">
    <span class="nav-icon">💼</span><span class="nav-label">Trabalho</span>
  </div>
  <div class="nav-item" data-view="saude">
    <span class="nav-icon">🩺</span><span class="nav-label">Saúde</span>
  </div>
  <div class="nav-item" data-view="relacionamentos">
    <span class="nav-icon">🤝</span><span class="nav-label">Relacionamentos</span>
  </div>
  <div class="nav-item" data-view="lazer">
    <span class="nav-icon">🎯</span><span class="nav-label">Lazer</span>
  </div>
  <div class="nav-item" data-view="academico">
    <span class="nav-icon">📚</span><span class="nav-label">Acadêmico</span>
  </div>
  <div class="nav-item" data-view="financeiro">
    <span class="nav-icon">💰</span><span class="nav-label">Financeiro</span>
  </div>
  <div class="nav-item" data-view="agenda">
    <span class="nav-icon">📅</span><span class="nav-label">Agenda</span>
  </div>
</nav>

<!-- MAIN -->
<main id="main">

  <!-- BRAINDUMP -->
  <div class="view active" id="view-braindump">
    <div class="dump-box">
      <textarea id="braindump-text" placeholder="Despeje tudo aqui..."></textarea>
      <div class="dump-actions">
        <button class="btn" onclick="App.organizeDump()">Organizar</button>
        <button class="btn btn-ghost" onclick="App.clearDump()">Limpar</button>
      </div>
    </div>
    <div id="dump-results"></div>
  </div>

  <!-- SECTION VIEWS -->
  <div class="view" id="view-trabalho">
    <div class="view-title"><span>💼</span> Trabalho</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-trabalho" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('trabalho')">Adicionar</button>
    </div>
    <div class="columns" id="cols-trabalho"></div>
  </div>

  <div class="view" id="view-saude">
    <div class="view-title"><span>🩺</span> Saúde</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-saude" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('saude')">Adicionar</button>
    </div>
    <div class="columns" id="cols-saude"></div>
  </div>

  <div class="view" id="view-relacionamentos">
    <div class="view-title"><span>🤝</span> Relacionamentos</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-relacionamentos" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('relacionamentos')">Adicionar</button>
    </div>
    <div class="columns" id="cols-relacionamentos"></div>
  </div>

  <div class="view" id="view-lazer">
    <div class="view-title"><span>🎯</span> Lazer</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-lazer" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('lazer')">Adicionar</button>
    </div>
    <div class="columns" id="cols-lazer"></div>
  </div>

  <div class="view" id="view-academico">
    <div class="view-title"><span>📚</span> Acadêmico</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-academico" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('academico')">Adicionar</button>
    </div>
    <div class="columns" id="cols-academico"></div>
  </div>

  <div class="view" id="view-financeiro">
    <div class="view-title"><span>💰</span> Financeiro</div>
    <div class="quick-add-row">
      <input class="text-input" id="qi-financeiro" placeholder="Adicionar item..." />
      <button class="btn" onclick="App.quickAdd('financeiro')">Adicionar</button>
    </div>
    <div class="columns" id="cols-financeiro"></div>
  </div>

  <!-- AGENDA -->
  <div class="view" id="view-agenda">
    <div class="view-title"><span>📅</span> Agenda</div>
    <div class="week-grid" id="week-grid"></div>
  </div>

</main>

<!-- RIGHT PANEL TOGGLE -->
<button id="panel-toggle" onclick="App.togglePanel()" title="Painel lateral">◀</button>

<!-- RIGHT PANEL -->
<aside id="right-panel">
  <div class="panel-sec">
    <div class="panel-sec-title">Foco desta semana</div>
    <textarea class="panel-textarea" id="p-focus" placeholder="Defina seu foco..."></textarea>
  </div>
  <div class="panel-sec">
    <div class="panel-sec-title">Pendências críticas</div>
    <ul class="panel-list" id="p-pending-list"></ul>
    <input class="panel-add" id="p-pending-input" placeholder="+ Adicionar pendência" />
  </div>
  <div class="panel-sec">
    <div class="panel-sec-title">Ideias para não perder</div>
    <ul class="panel-list" id="p-ideas-list"></ul>
    <input class="panel-add" id="p-ideas-input" placeholder="+ Adicionar ideia" />
  </div>
</aside>

<!-- FOOTER -->
<footer id="footer">
  <span id="last-updated">—</span>
  <div class="status-indicator">
    <div class="status-dot"></div>
    Ativo
  </div>
</footer>

<script>
'use strict';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STORAGE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const STORE_KEY = 'sb-karen-lira-v1';

function freshState() {
  return {
    dumpText: '',
    dumpCards: [],
    sections: {
      trabalho:        { andamento: [], pendente: [], concluido: [] },
      saude:           { andamento: [], pendente: [], concluido: [] },
      relacionamentos: { andamento: [], pendente: [], concluido: [] },
      lazer:           { andamento: [], pendente: [], concluido: [] },
      academico:       { andamento: [], pendente: [], concluido: [] },
      financeiro:      { andamento: [], pendente: [], concluido: [] },
    },
    agenda: {},
    panel: { focus: '', pending: [], ideas: [] },
    panelOpen: false,
    lastSaved: null,
  };
}

let S = (function load() {
  try { return Object.assign(freshState(), JSON.parse(localStorage.getItem(STORE_KEY)) || {}); }
  catch (_) { return freshState(); }
})();

function save() {
  S.lastSaved = new Date().toISOString();
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch (_) {}
  renderFooter();
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CLOCK & FOOTER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DAYS_PT   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function renderClock() {
  const n = new Date();
  const date = `${DAYS_PT[n.getDay()]}, ${n.getDate()} ${MONTHS_PT[n.getMonth()]} ${n.getFullYear()}`;
  const time = n.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('clock').textContent = `${date} · ${time}`;
}

function renderFooter() {
  const el = document.getElementById('last-updated');
  if (S.lastSaved) {
    const d = new Date(S.lastSaved);
    el.textContent = `Salvo ${d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })}`;
  } else {
    el.textContent = '—';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NAVIGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SECTION_AREAS = ['trabalho','saude','relacionamentos','lazer','academico','financeiro'];

function navigate(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('view-' + view);
  if (el) el.classList.add('active');
  const nav = document.querySelector('[data-view="' + view + '"]');
  if (nav) nav.classList.add('active');

  if (view === 'agenda') renderAgenda();
  else if (SECTION_AREAS.includes(view)) renderSection(view);
}

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => navigate(item.dataset.view));
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CLASSIFIER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AREA_KW = {
  trabalho:        ['trabalho','projeto','reunião','reuniao','cliente','contrato','email','prazo','entrega','proposta','ofício','oficio','escritório','escritorio','advocacia','jurídico','juridico','audiência','audiencia','petição','peticao','processo','tarefa','demanda'],
  saude:           ['médico','medico','exercício','exercicio','academia','dieta','consulta','remédio','remedio','dormir','sono','saúde','saude','treino','alimentação','alimentacao','psicólogo','psicologo','exame','vacina','dor','hospital','farmácia','farmacia'],
  relacionamentos: ['família','familia','amigo','amiga','namoro','encontro','ligar para','jantar','visitar','aniversário','aniversario','filho','marido','esposa','mãe','mae','pai','irmão','irmao','irmã','irma','sogra','sogro','relacionamento'],
  lazer:           ['viagem','filme','série','serie','livro','restaurante','passeio','férias','ferias','show','teatro','fim de semana','netflix','música','musica','hobby','descanso','lazer','viajar','praia','parque'],
  academico:       ['estudo','estudar','curso','prova','aula','pesquisa','leitura','artigo','faculdade','pós','pos','certificação','certificacao','aprender','capacitação','capacitacao','graduação','graduacao','seminário','seminario','treinamento'],
  financeiro:      ['pagar','receber','conta','fatura','investimento','banco','imposto','financeiro','dinheiro','despesa','receita','orçamento','orcamento','cartão','cartao','transferência','transferencia','boleto','parcelar','salário','salario','divida','dívida'],
};

const TYPE_KW = {
  tarefa:    ['fazer','completar','enviar','ligar','ir a','ir ao','comparecer','resolver','finalizar','entregar','agendar','comprar','buscar'],
  ideia:     ['e se','ideia','pensar em','poderia','quero','gostaria','explorar','testar','tentar','seria','imagina'],
  projeto:   ['projeto','iniciar','desenvolver','criar','lançar','lancar','implementar','planejar','estruturar','montar'],
  pendência: ['pendente','falta','precisa','atrasado','pendência','pendencia','não fiz','nao fiz','esqueci','lembrar','cobrar','verificar','checar'],
  insight:   ['aprendi','percebi','insight','observei','descobri','entendi','notei','refleti','percebi','concluí','concluei'],
};

const AREA_ICONS = {
  trabalho:'💼', saude:'🩺', relacionamentos:'🤝',
  lazer:'🎯', academico:'📚', financeiro:'💰', geral:'📌',
};

function classifyArea(text) {
  const t = text.toLowerCase();
  let best = 'geral', bestScore = 0;
  for (const [area, kws] of Object.entries(AREA_KW)) {
    const score = kws.reduce((n, k) => n + (t.includes(k) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; best = area; }
  }
  return best;
}

function classifyType(text) {
  const t = text.toLowerCase();
  let best = 'item', bestScore = 0;
  for (const [type, kws] of Object.entries(TYPE_KW)) {
    const score = kws.reduce((n, k) => n + (t.includes(k) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; best = type; }
  }
  return best;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BRAINDUMP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderDumpCards() {
  const el = document.getElementById('dump-results');
  const cards = S.dumpCards;
  if (!cards.length) { el.innerHTML = ''; return; }

  el.innerHTML = cards.map(c => `
    <div class="dump-card area-${c.area}">
      <div class="dump-card-header">
        <span class="area-icon">${AREA_ICONS[c.area] || '📌'}</span>
        <span class="type-badge">${esc(c.type)}</span>
      </div>
      <div class="dump-card-text">${esc(c.text)}</div>
      <div class="dump-card-actions">
        <button class="card-btn arch" onclick="App.archiveDump('${c.id}')">× Arquivar</button>
        <button class="card-btn promo" onclick="App.promoteDump('${c.id}')">→ Promover</button>
      </div>
    </div>
  `).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SECTION COLUMNS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const COL_LABELS = { andamento:'Em andamento', pendente:'Pendente', concluido:'Concluído' };
const COLS = ['andamento','pendente','concluido'];

function renderSection(area) {
  const container = document.getElementById('cols-' + area);
  const data = S.sections[area];

  container.innerHTML = COLS.map(col => {
    const items = data[col] || [];
    const others = COLS.filter(c => c !== col);

    const cardsHtml = items.length
      ? items.map(item => `
          <div class="col-card">
            <div class="col-card-text">${esc(item.text)}</div>
            <div class="col-card-btns">
              ${others.map(o => `
                <button class="col-card-btn" onclick="App.moveCard('${area}','${item.id}','${col}','${o}')">
                  → ${esc(COL_LABELS[o])}
                </button>`).join('')}
              <button class="col-card-btn del" onclick="App.deleteCard('${area}','${item.id}','${col}')">× Remover</button>
            </div>
          </div>`).join('')
      : `<div class="empty-state">Nenhuma pendência registrada.<br>Use o Braindump para capturar.</div>`;

    return `
      <div class="col-box">
        <div class="col-header">
          <span class="col-title">${COL_LABELS[col]}</span>
          <span class="col-count">${items.length}</span>
        </div>
        <div class="col-items">${cardsHtml}</div>
      </div>`;
  }).join('');

  // Enter key on quick-add
  const inp = document.getElementById('qi-' + area);
  if (inp) inp.onkeydown = e => { if (e.key === 'Enter') App.quickAdd(area); };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AGENDA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderAgenda() {
  const grid = document.getElementById('week-grid');
  const today = new Date();
  today.setHours(0,0,0,0);

  grid.innerHTML = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = d.toISOString().slice(0, 10);
    const isToday = i === 0;
    const events = S.agenda[key] || [];

    return `
      <div class="day-card${isToday ? ' today' : ''}">
        <div class="day-name">${DAYS_PT[d.getDay()]}</div>
        <div class="day-num">${d.getDate()}</div>
        <div class="day-events">
          ${events.map((ev, idx) => `
            <div class="day-event">
              <span>${esc(ev)}</span>
              <button class="day-event-rm" onclick="App.removeEvent('${key}',${idx})">×</button>
            </div>`).join('')}
        </div>
        <input class="day-add" placeholder="+ Compromisso"
          onkeydown="if(event.key==='Enter'&&this.value.trim()){App.addEvent('${key}',this)}" />
      </div>`;
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RIGHT PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PANEL_W = 280;

function applyPanelState() {
  const panel   = document.getElementById('right-panel');
  const toggle  = document.getElementById('panel-toggle');
  const main    = document.getElementById('main');
  panel.classList.toggle('open', S.panelOpen);
  main.classList.toggle('panel-open', S.panelOpen);
  toggle.style.right = S.panelOpen ? PANEL_W + 'px' : '0px';
  toggle.textContent  = S.panelOpen ? '▶' : '◀';
}

function renderPanelList(type) {
  const list = document.getElementById('p-' + type + '-list');
  const items = S.panel[type] || [];
  list.innerHTML = items.map((it, i) => `
    <li class="panel-list-item">
      <input type="checkbox" ${it.done ? 'checked' : ''} onchange="App.togglePanelItem('${type}',${i})">
      <span class="panel-item-text${it.done ? ' done' : ''}">${esc(it.text)}</span>
      <button class="panel-rm" onclick="App.removePanelItem('${type}',${i})">×</button>
    </li>`).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// APP (public API called from inline handlers)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const App = {

  // BRAINDUMP
  organizeDump() {
    const ta = document.getElementById('braindump-text');
    const raw = ta.value.trim();
    if (!raw) return;
    const lines = raw.split(/\n+/).map(l => l.trim()).filter(Boolean);
    const newCards = lines.map(text => ({
      id: uid(),
      text,
      area: classifyArea(text),
      type: classifyType(text),
    }));
    S.dumpCards = [...S.dumpCards, ...newCards];
    S.dumpText = ta.value;
    save();
    renderDumpCards();
  },

  clearDump() {
    document.getElementById('braindump-text').value = '';
    S.dumpText = '';
    save();
  },

  archiveDump(id) {
    S.dumpCards = S.dumpCards.filter(c => c.id !== id);
    save();
    renderDumpCards();
  },

  promoteDump(id) {
    const card = S.dumpCards.find(c => c.id === id);
    if (!card || card.area === 'geral') return;
    S.sections[card.area].pendente.push({ id: uid(), text: card.text });
    S.dumpCards = S.dumpCards.filter(c => c.id !== id);
    save();
    renderDumpCards();
  },

  // SECTIONS
  quickAdd(area) {
    const inp = document.getElementById('qi-' + area);
    const text = inp.value.trim();
    if (!text) return;
    S.sections[area].pendente.push({ id: uid(), text });
    inp.value = '';
    save();
    renderSection(area);
  },

  moveCard(area, itemId, fromCol, toCol) {
    const data = S.sections[area];
    const idx  = data[fromCol].findIndex(i => i.id === itemId);
    if (idx === -1) return;
    const [item] = data[fromCol].splice(idx, 1);
    data[toCol].push(item);
    save();
    renderSection(area);
  },

  deleteCard(area, itemId, col) {
    S.sections[area][col] = S.sections[area][col].filter(i => i.id !== itemId);
    save();
    renderSection(area);
  },

  // AGENDA
  addEvent(key, input) {
    const text = input.value.trim();
    if (!text) return;
    if (!S.agenda[key]) S.agenda[key] = [];
    S.agenda[key].push(text);
    input.value = '';
    save();
    renderAgenda();
  },

  removeEvent(key, idx) {
    if (S.agenda[key]) {
      S.agenda[key].splice(idx, 1);
      save();
      renderAgenda();
    }
  },

  // PANEL
  togglePanel() {
    S.panelOpen = !S.panelOpen;
    applyPanelState();
    save();
  },

  togglePanelItem(type, idx) {
    S.panel[type][idx].done = !S.panel[type][idx].done;
    save();
    renderPanelList(type);
  },

  removePanelItem(type, idx) {
    S.panel[type].splice(idx, 1);
    save();
    renderPanelList(type);
  },
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function init() {
  // Clock
  renderClock();
  setInterval(renderClock, 1000);

  // Restore braindump textarea
  document.getElementById('braindump-text').value = S.dumpText || '';
  renderDumpCards();

  // Panel state
  applyPanelState();

  // Panel focus textarea
  const focusEl = document.getElementById('p-focus');
  focusEl.value = S.panel.focus || '';
  focusEl.addEventListener('input', () => { S.panel.focus = focusEl.value; save(); });

  // Panel list inputs
  function panelListInput(type) {
    const inp = document.getElementById('p-' + type + '-input');
    inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const text = inp.value.trim();
      if (!text) return;
      S.panel[type].push({ text, done: false });
      inp.value = '';
      save();
      renderPanelList(type);
    });
  }
  panelListInput('pending');
  panelListInput('ideas');

  renderPanelList('pending');
  renderPanelList('ideas');

  // Footer
  renderFooter();
})();
</script>
</body>
</html>
